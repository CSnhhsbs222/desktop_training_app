<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Hire Hub</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand-lockup">
          <div class="brand-mark">CS</div>
          <div>
            <p class="eyebrow">School-Based Services</p>
            <h1>New Hire Hub</h1>
          </div>
        </div>
        <nav class="nav-list">
          <button class="nav-item active" data-view="home">⌂ Home</button>
          <button class="nav-item" data-view="welcome">◇ Welcome Center</button>
          <button class="nav-item" data-view="training">▣ Training Dashboard</button>
        </nav>
        <button class="settings-button" id="openSettings">⚙ Settings</button>
      </aside>

      <main class="main-content">
        <section id="home" class="view active-view"></section>
        <section id="welcome" class="view"></section>
        <section id="training" class="view"></section>
      </main>
    </div>

    <dialog id="settingsDialog" class="settings-dialog">
      <form method="dialog" class="settings-card" id="profileForm">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Profile saves locally on this device</p>
            <h2>Settings</h2>
          </div>
          <button class="icon-button" value="cancel" aria-label="Close settings">×</button>
        </div>
        <div class="profile-grid">
          <label>First Name<input name="firstName" autocomplete="given-name" /></label>
          <label>Preferred Name<input name="preferredName" /></label>
          <label>Last Name<input name="lastName" autocomplete="family-name" /></label>
          <label>Birthday MM/DD<input name="birthday" placeholder="MM/DD" /></label>
          <label>Hire Date<input name="hireDate" type="date" /></label>
          <label>Profile Photo<input name="photo" type="file" accept="image/*" /></label>
        </div>
        <div class="dialog-actions">
          <button type="button" class="ghost-button" id="clearProfile">Clear</button>
          <button class="primary-button" value="default">Save Profile</button>
        </div>
      </form>
    </dialog>

    <script src="src/data.js"></script>
    <script src="src/app.js"></script>

      };
      const coreTrainingOrder = [
        'avatar',
        'scheduling',
        'relationship',
        'telehealth',
        'diagnosing',
        'prevention',
        'eleos',
        'groups',
        'cohort'
      ];
      const placeholderCoreTrainings = [
        { id: 'ecosystem-workbook', title: 'Ecosystem Workbook', trainer: 'Training team', purpose: 'Placeholder content for a later microbuild.', objectives: ['Placeholder content for a later microbuild.'], resources: [] },
        { id: 'shadowing-mentorship', title: 'Shadowing & Mentorship', trainer: 'Training team', purpose: 'Placeholder content for a later microbuild.', objectives: ['Placeholder content for a later microbuild.'], resources: [] }
      ];
      function orderedCoreTrainings() {
        const existing = HUB_DATA.trainings || [];
        return [
          ...coreTrainingOrder.map(id => existing.find(training => training.id === id)).filter(Boolean),
          ...placeholderCoreTrainings
        ];
      }
      function renderJulyCalendar() {
        const weekDayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const calendarDays = [];
        for (let i = 0; i < 3; i += 1) calendarDays.push(null);
        for (let day = 1; day <= 31; day += 1) calendarDays.push(day);
        while (calendarDays.length % 7 !== 0) calendarDays.push(null);
        const selectedDay = julyTrainingSchedule[selectedCalendarDate];
        return `
          <div class="card calendar-card">
            <div class="calendar-intro">
              <div>
                <p class="eyebrow">Training Calendar</p>
                <h2>July 2026</h2>
                <p>Click a scheduled day to view the plain-text agenda details. More months can be added later as training dates are finalized.</p>
              </div>
              <strong>${Object.keys(julyTrainingSchedule).length} scheduled days</strong>
            </div>
            <div class="monthly-calendar" aria-label="July 2026 training calendar">
              ${weekDayNames.map(day => `<div class="calendar-weekday">${day}</div>`).join('')}
              ${calendarDays.map(day => {
                if (!day) return '<div class="calendar-day calendar-empty" aria-hidden="true"></div>';
                const dateKey = `2026-07-${String(day).padStart(2, '0')}`;
                const schedule = julyTrainingSchedule[dateKey];
                if (!schedule) return `<div class="calendar-day"><span>${day}</span></div>`;
                return `<button class="calendar-day calendar-scheduled ${selectedCalendarDate === dateKey ? 'selected' : ''}" data-calendar-date="${dateKey}"><span>${day}</span><small>Click here</small><strong>${schedule.summary}</strong></button>`;
              }).join('')}
            </div>
          </div>
          <div class="card day-detail-card">
            <p class="eyebrow">Selected Day</p>
            <h2>${selectedDay.label}</h2>
            <div class="day-agenda">
              ${selectedDay.blocks.map(block => `
                <div class="agenda-block">
                  <strong>${block.time}</strong>
                  <h3>${block.title}</h3>
                  ${block.details.map(detail => `<p>${detail}</p>`).join('')}
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
      renderTraining = function () {
        const trainings = orderedCoreTrainings();
        const currentTraining = trainings[selectedTraining] || trainings[0];
        byId('training').innerHTML = `
          <div class="card training-hero">
            <div>
              <p class="eyebrow">Training Dashboard</p>
              <h2>Training Dashboard</h2>
              <p>Use the tabs below to access the training calendar, core trainings, and Relias training list.</p>
            </div>
            <strong>3 tabs</strong>
          </div>
          <div class="check-tabs">
            <button class="tab-button ${trainingDashboardTab === 'calendar' ? 'active' : ''}" data-training-tab="calendar">Training Calendar</button>
            <button class="tab-button ${trainingDashboardTab === 'core' ? 'active' : ''}" data-training-tab="core">Core Trainings</button>
            <button class="tab-button ${trainingDashboardTab === 'relias' ? 'active' : ''}" data-training-tab="relias">Relias Trainings</button>
          </div>
          <div id="trainingTabPanel"></div>
        `;
        if (trainingDashboardTab === 'calendar') {
          byId('trainingTabPanel').innerHTML = renderJulyCalendar();
        }
        if (trainingDashboardTab === 'core') {
          byId('trainingTabPanel').innerHTML = `
            <div class="training-dashboard-grid page-gap">
              <div class="training-card-grid">${trainings.map((training, index) => trainingCard(training, index)).join('')}</div>
              <div id="trainingDetail" class="card training-detail-card"></div>
            </div>
          `;
          renderTrainingDetail(currentTraining);
        }
        if (trainingDashboardTab === 'relias') {
          byId('trainingTabPanel').innerHTML = `
            <div class="card">
              <p class="eyebrow">Relias Trainings</p>
              <h2>Relias Trainings</h2>
              <p>Placeholder for the required Relias training list and suggested completion order. No links or details have been added yet.</p>
            </div>
          `;
        }
      };
      document.addEventListener('click', event => {
        const tab = event.target.closest('[data-training-tab]');
        if (tab) {
          trainingDashboardTab = tab.dataset.trainingTab;
          if (trainingDashboardTab !== 'core') selectedTraining = 0;
          renderTraining();
          return;
        }
        const calendarDay = event.target.closest('[data-calendar-date]');
        if (!calendarDay) return;
        selectedCalendarDate = calendarDay.dataset.calendarDate;
        renderTraining();
      });
      renderTraining();
    </script>
    <script src="src/resource-launchers.js"></script>
  </body>
</html>
